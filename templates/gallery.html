<!DOCTYPE html>
<html>
<head>
    <title>My Art Store</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        h1{
            text-align:center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content:center;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 15px;
            width: 250px;
            box-shadow: 0 0 10px #ccc;
            border-radius:10px;
        }

        img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .price {
            color: green;
            font-size: 18px;
            font-weight:bold;
        }

        button {
            background: black;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            cursor:pointer;
        }
    </style>
</head>

<body>

<h1>🎨 My Art Store</h1>
                       <a href="/logout">Logout</a>
<div class="container">

{% for art in artworks %}
<div class="card">
    <img src="{{ art.image_url }}">
    <h3>{{ art.title }}</h3>
    <p class="price">₹ {{ art.price }}</p>
    <a href="/buy/{{ art.id }}">
    <button>Buy Now</button>
    
</a>
</div>
{% endfor %}

</div>

</body>
</html>
